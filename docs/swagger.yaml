basePath: /
definitions:
  handler.shortenURLRequest:
    properties:
      url:
        type: string
    required:
    - url
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the API documentation for the Bookmark Management Service.
  title: Bookmark Management API
  version: "1.0"
paths:
  /gen-pass:
    get:
      description: Generate a random password with specified criteria
      produces:
      - text/plain
      responses:
        "200":
          description: Generated password
          schema:
            type: string
        "500":
          description: Failed to generate password
          schema:
            type: string
      summary: Generate a random password
      tags:
      - Password
  /shorten:
    post:
      consumes:
      - application/json
      description: Create a short key for the provided URL
      parameters:
      - description: URL to shorten
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.shortenURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Shortened key
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid input
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Shorten a URL
      tags:
      - ShortenURL
swagger: "2.0"
