services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}

  bookmark_service:
    image: ${DOCKERHUB_USERNAME}/bookmark_service:dev
    container_name: bookmark_service
    restart: always
    env_file:
      - ./bookmark_service/.env
    depends_on:
      - redis

  bookmark_service_2:
    image: ${DOCKERHUB_USERNAME}/bookmark_service:dev
    container_name: bookmark_service_2
    restart: always
    env_file:
      - ./bookmark_service/.env
    depends_on:
      - redis

  bookmark_service_3:
    image: ${DOCKERHUB_USERNAME}/bookmark_service:dev
    container_name: bookmark_service_3
    restart: always
    env_file:
      - ./bookmark_service/.env
    depends_on:
      - redis

  portal:
    image: ebvn/bookmark-app-portal:dev
    container_name: portal
    restart: always

  nginx: 
    image: nginx:alpine
    container_name: nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - bookmark_service
      - bookmark_service_2
      - bookmark_service_3
      - portal